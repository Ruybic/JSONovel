<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Harmony Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main-menu">
        <div class="menu-left">
            <h1 class="game-title">PROJECT: HARMONY</h1>
            <div class="menu-buttons">
                <button class="menu-btn" onclick="initEditor('new')"><span>NEW ARCHIVE</span></button>
                <button class="menu-btn" onclick="initEditor('load')"><span>CONTINUE SAVED</span></button>
                <label for="game-upload" class="menu-btn upload-btn"><span>LOAD CARTRIDGE</span></label>
                <input type="file" id="game-upload" accept=".json" style="display:none">
            </div>
            <div class="menu-footer">NODE GRAPH ENABLED // ENGINE V3</div>
        </div>
        <div class="menu-right">
            <img src="https://files.catbox.moe/l1muwb.png" alt="Waifu" class="menu-waifu">
        </div>
    </div>

    <div id="game-stage" class="hidden">
        <div id="background-layer"></div>
        <div id="char-container" class="pos-center">
            <div id="char-glow"></div>
            <img id="character-sprite" src="" alt="Character">
        </div>
        <div id="ui-layer">
            <div id="speaker-name">Name</div>
            <div id="dialogue-text">Dialogue goes here...</div>
            <div id="choices-container"></div>
        </div>
        <button id="exit-game-btn" onclick="exitGame()">Stop Test</button>
    </div>

    <div id="node-editor" class="hidden">
        <div id="editor-sidebar" data-editing-id="">
            <h3>Node Editor <span style="font-size: 0.6rem; color: #28a745;">(Auto-Saving)</span></h3>
            
            <div class="editor-section">
                <label>Node ID (Must be unique):</label>
                <input type="text" id="edit-id" oninput="autoSave()">
            </div>

            <div class="editor-section">
                <label>Dialogue:</label>
                <input type="text" id="edit-speaker" placeholder="Speaker Name" oninput="autoSave()">
                <textarea id="edit-text" rows="3" placeholder="What do they say?" oninput="autoSave()"></textarea>
            </div>

            <div class="editor-section">
                <label>Background & Scale:</label>
                <input type="text" id="edit-bgUrl" placeholder="BG Image URL" oninput="autoSave()">
                <div class="slider-group">
                    <input type="range" id="edit-bgScale" min="50" max="200" value="100" title="Zoom" oninput="autoSave()">
                    <input type="range" id="edit-bgX" min="0" max="100" value="50" title="X Position" oninput="autoSave()">
                    <input type="range" id="edit-bgY" min="0" max="100" value="50" title="Y Position" oninput="autoSave()">
                </div>
            </div>

            <div class="editor-section">
                <label>Character & Position:</label>
                <input type="text" id="edit-charUrl" placeholder="Char Image URL" oninput="autoSave()">
                <select id="edit-charPos" onchange="autoSave()">
                    <option value="pos-left">Position: Left</option>
                    <option value="pos-center">Position: Center</option>
                    <option value="pos-right">Position: Right</option>
                </select>
                <select id="edit-charAnim" onchange="autoSave()">
                    <option value="fade-in-up">Anim: Fade Up</option>
                    <option value="fade-in-left">Anim: Slide Right</option>
                    <option value="fade-in-right">Anim: Slide Left</option>
                </select>
                <label>Glow Color:</label>
                <input type="color" id="edit-charGlow" value="#ffffff" oninput="autoSave()">
            </div>

            <div class="editor-section">
                <label style="color: #28a745;">Linear Link (Main Story):</label>
                <input type="text" id="edit-next" placeholder="Target Node ID (Leaves blank for choices)" oninput="autoSave()">
                
                <label style="color: #007bff; margin-top: 10px;">Branching (Decisions):</label>
                <div id="choices-list"></div>
                <button onclick="addChoice()" class="tool-btn" style="background: #333;">+ Add Choice</button>
            </div>

            <div class="action-buttons">
                <button onclick="addNode()" class="tool-btn add-btn">➕ New Free Node</button>
                <button onclick="testGameFromEditor()" class="tool-btn test-btn">▶️ Test Scene</button>
                <button onclick="exportGame()" class="tool-btn export-btn">📦 Download JSON</button>
                <button onclick="wipeProject()" class="tool-btn danger-btn">🗑️ Clear Save</button>
            </div>
        </div>

        <div id="canvas-area">
            <div id="drag-plane">
                <svg id="connection-lines"></svg>
                <div id="node-container"></div>
            </div>
        </div>
    </div>

    <script src="engine.js"></script>
</body>
</html>
